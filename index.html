<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>能源新闻聚合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #b0b0b0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: calc(60px + env(safe-area-inset-bottom));
        }

        /* ========== 顶部标题 ========== */
        .header {
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            text-align: center;
            border-bottom: 0.5px solid #222;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: #e0e0e0;
        }

        .header-meta {
            font-size: 13px;
            color: #666;
            margin-top: 6px;
        }

        /* ========== 底部导航栏 ========== */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #0a0a0a;
            border-top: 0.5px solid #222;
            display: flex;
            justify-content: space-around;
            padding: 10px 0;
            padding-bottom: calc(10px + env(safe-area-inset-bottom));
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            text-align: center;
            padding: 8px 0;
            cursor: pointer;
            transition: all 0.2s;
        }

        .nav-item .icon {
            font-size: 22px;
            margin-bottom: 4px;
        }

        .nav-item .label {
            font-size: 13px;
            color: #666;
        }

        .nav-item.active .label {
            color: #0a84ff;
            font-weight: 600;
        }

        .nav-item.active .icon {
            color: #0a84ff;
        }

        /* ========== 新闻列表 ========== */
        .news-list {
            padding: 12px 16px;
        }

        .news-item {
            display: flex;
            align-items: flex-start;
            padding: 14px 0;
            border-bottom: 0.5px solid #1a1a1a;
        }

        .news-item:last-child {
            border-bottom: none;
        }

        .news-index {
            font-size: 16px;
            font-weight: 600;
            color: #0a84ff;
            min-width: 28px;
            padding-top: 2px;
        }

        .news-content {
            flex: 1;
            min-width: 0;
        }

        .news-title {
            font-size: 17px;
            font-weight: 500;
            color: #c8c8c8;
            line-height: 1.5;
            margin-bottom: 10px;
        }

        .news-actions {
            display: flex;
            gap: 8px;
        }

        .action-btn {
            padding: 6px 14px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.15s;
        }

        .link-btn {
            background: #0a84ff;
            color: #fff;
        }

        .link-btn:active {
            background: #0070e0;
            transform: scale(0.95);
        }

        .share-btn {
            background: #2c2c2e;
            color: #b0b0b0;
        }

        .share-btn:active {
            background: #3a3a3c;
            transform: scale(0.95);
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #555;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* ========== 加载状态 ========== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #555;
        }

        /* ========== Toast 提示 ========== */
        .toast {
            position: fixed;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: #1c1c1e;
            color: #fff;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .toast.show {
            opacity: 1;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚡ 能源新闻聚合</div>
        <div class="header-meta" id="updateTime">加载中...</div>
    </div>

    <div class="news-list" id="newsList">
        <div class="loading">正在加载...</div>
    </div>

    <nav class="nav-bar">
        <div class="nav-item active" data-category="policy" onclick="switchCategory('policy')">
            <div class="icon">📋</div>
            <div class="label">政策法规</div>
        </div>
        <div class="nav-item" data-category="industry" onclick="switchCategory('industry')">
            <div class="icon">📊</div>
            <div class="label">行业新闻</div>
        </div>
        <div class="nav-item" data-category="enterprise" onclick="switchCategory('enterprise')">
            <div class="icon">🏢</div>
            <div class="label">企业新闻</div>
        </div>
    </nav>

    <div class="toast" id="toast"></div>

    <script>
        // ========== 配置 ==========
        const DATA_URL = 'https://cdn.jsdelivr.net/gh/woaipashanhu/energy-news-data/data.json';
        
        // 测试数据（实际使用时删除）
        const TEST_DATA = {
            lastUpdate: "2026-03-07T16:30:00Z",
            news: [
                {
                    id: "1",
                    title: "工信部等六部门发布绿色消费推进行动通知 20条举措护航十五五绿色转型",
                    link: "https://www.news.cn/energy/20260105/9bfbc0e4418c45feae2fb9bea3adc6c5/c.html",
                    categories: ["政策法规"],
                    publishDate: "2026-01-05"
                },
                {
                    id: "2",
                    title: "全国政协委员江毅：构建新型电力系统 推动能源绿色低碳高质量发展",
                    link: "https://www.news.cn/energy/20260306/f0ab51cb21b641c3b01af30b678a09ed/c.html",
                    categories: ["企业新闻"],
                    publishDate: "2026-03-06"
                },
                {
                    id: "3",
                    title: "国家电网公司员工当选2025年大国工匠年度人物",
                    link: "https://www.news.cn/energy/20260305/59963459f9f44a7bb7444bbd84039d60/c.html",
                    categories: ["企业新闻"],
                    publishDate: "2026-03-05"
                },
                {
                    id: "4",
                    title: "全国人大代表王政涛：强化晋电对京津冀地区的供电保障能力",
                    link: "https://www.news.cn/energy/20260306/0825abfe257642949523ca1ba7cbef3e/c.html",
                    categories: ["企业新闻"],
                    publishDate: "2026-03-06"
                },
                {
                    id: "5",
                    title: "全国政协委员阮前途：推动构建超大城市新型电力系统",
                    link: "https://www.news.cn/energy/20260306/1524a4a5d50b4544b81d59131eb8ad02/c.html",
                    categories: ["企业新闻"],
                    publishDate: "2026-03-06"
                },
                {
                    id: "6",
                    title: "铜锌锡硫硒太阳能电池光电转换效率突破15%",
                    link: "https://www.news.cn/energy/20260227/349c115450314bc5a18da69e41270668/c.html",
                    categories: ["行业新闻"],
                    publishDate: "2026-02-27"
                },
                {
                    id: "7",
                    title: "陕京管道系统累计输气量突破8000亿立方米",
                    link: "https://www.news.cn/energy/20260226/f8872f265a6e4897927462d8b5249df6/c.html",
                    categories: ["行业新闻"],
                    publishDate: "2026-02-26"
                },
                {
                    id: "8",
                    title: "我国最大的煤岩气田年产能突破40亿立方米",
                    link: "https://www.news.cn/energy/20260306/5f9aa95e9289493aa2dee2a6867349a9/c.html",
                    categories: ["行业新闻"],
                    publishDate: "2026-03-06"
                },
                {
                    id: "9",
                    title: "代表委员话核能：多维发力推动核工业高质量发展",
                    link: "https://www.news.cn/energy/20260306/e89bd7953be04009a1ca945927d056b0/c.html",
                    categories: ["行业新闻"],
                    publishDate: "2026-03-06"
                },
                {
                    id: "10",
                    title: "全国政协委员马永生：统筹氢能产业链科产融合 推动规模化高质量发展",
                    link: "https://www.news.cn/energy/20260306/7967e30a337845b59dfc3ef5eb0e4b99/c.html",
                    categories: ["企业新闻"],
                    publishDate: "2026-03-06"
                },
                {
                    id: "11",
                    title: "光伏反内卷：应以创新破局，以精准施策护航",
                    link: "https://www.news.cn/energy/20260115/a9f19c16b4254fb8aa7979ef478e896a/c.html",
                    categories: ["行业新闻"],
                    publishDate: "2026-01-15"
                },
                {
                    id: "12",
                    title: "中国石化胜利油田规模化绿热工业应用获进展",
                    link: "https://www.news.cn/energy/20260212/f17a526e84694f49b10dce5589c60bf7/c.html",
                    categories: ["行业新闻"],
                    publishDate: "2026-02-12"
                }
            ]
        };

        // ========== 全局状态 ==========
        let allNews = [];
        let currentCategory = 'policy'; // 默认显示政策法规
        let useTestData = true; // 使用测试数据

        // 分类映射
        const CATEGORY_MAP = {
            'policy': '政策法规',
            'industry': '行业新闻',
            'enterprise': '企业新闻'
        };

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // ========== 加载数据 ==========
        async function loadData() {
            // 先使用测试数据
            if (useTestData) {
                allNews = TEST_DATA.news;
                document.getElementById('updateTime').textContent = 
                    `更新时间: ${formatTime(TEST_DATA.lastUpdate)}`;
                renderNews();
                return;
            }

            // 实际使用时从 GitHub 加载
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('加载数据失败');
                
                const data = await response.json();
                allNews = data.news || [];
                
                document.getElementById('updateTime').textContent = 
                    `更新时间: ${formatTime(data.lastUpdate)}`;
                
                renderNews();
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('newsList').innerHTML = 
                    '<div class="empty-state"><div class="icon">⚠️</div><div>加载数据失败</div></div>';
            }
        }

        // ========== 切换分类 ==========
        function switchCategory(category) {
            currentCategory = category;
            
            // 更新导航栏状态
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.toggle('active', item.dataset.category === category);
            });
            
            renderNews();
        }

        // ========== 渲染新闻列表 ==========
        function renderNews() {
            const container = document.getElementById('newsList');
            const targetCategory = CATEGORY_MAP[currentCategory];
            
            // 筛选当前分类的新闻
            let filteredNews = allNews.filter(news => {
                if (news.categories && news.categories.length > 0) {
                    return news.categories.includes(targetCategory);
                }
                // 没有分类的归为行业新闻
                return currentCategory === 'industry';
            });
            
            // 按日期排序
            filteredNews.sort((a, b) => {
                const dateA = new Date(a.publishDate || a.crawlDate);
                const dateB = new Date(b.publishDate || b.crawlDate);
                return dateB - dateA;
            });
            
            if (filteredNews.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无相关新闻</div></div>';
                return;
            }
            
            container.innerHTML = filteredNews.map((news, index) => `
                <div class="news-item">
                    <div class="news-index">${index + 1}</div>
                    <div class="news-content">
                        <div class="news-title">${escapeHtml(news.title)}</div>
                        <div class="news-actions">
                            <button class="action-btn link-btn" onclick="openLink('${escapeHtml(news.link)}')">链接</button>
                            <button class="action-btn share-btn" onclick="shareNews('${escapeHtml(news.title)}', '${escapeHtml(news.link)}')">分享</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // ========== 打开链接 ==========
        function openLink(link) {
            window.open(link, '_blank');
        }

        // ========== 分享新闻 ==========
        async function shareNews(title, link) {
            const shareData = {
                title: title,
                text: title,
                url: link
            };

            // 尝试使用原生分享 API
            if (navigator.share && navigator.canShare && navigator.canShare(shareData)) {
                try {
                    await navigator.share(shareData);
                    return;
                } catch (err) {
                    // 用户取消或其他错误，回退到复制链接
                }
            }

            // 回退：复制链接到剪贴板
            try {
                await navigator.clipboard.writeText(link);
                showToast('链接已复制');
            } catch (err) {
                // 兼容旧浏览器
                const textArea = document.createElement('textarea');
                textArea.value = link;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                showToast('链接已复制');
            }
        }

        // ========== Toast 提示 ==========
        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // ========== 工具函数 ==========
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            if (!isoString) return '未知';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
