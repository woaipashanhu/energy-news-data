<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>能源新闻聚合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ========== 顶部导航 ========== */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            border-bottom: 0.5px solid #333;
            z-index: 100;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: #0a84ff;
        }

        .header-meta {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 4px;
        }

        /* ========== 分类标签 ========== */
        .category-tabs {
            display: flex;
            overflow-x: auto;
            padding: 12px 16px;
            gap: 8px;
            background: #0a0a0a;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 8px 16px;
            background: #1c1c1e;
            border: none;
            border-radius: 20px;
            color: #8e8e93;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-tab.active {
            background: #0a84ff;
            color: #ffffff;
        }

        .category-tab:active {
            transform: scale(0.95);
        }

        /* ========== 分类区块 ========== */
        .category-section {
            padding: 16px;
        }

        .category-header {
            font-size: 18px;
            font-weight: 700;
            color: #0a84ff;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid #333;
        }

        /* ========== 新闻列表 ========== */
        .news-list {
            padding: 0;
        }

        .news-card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .news-content {
            flex: 1;
            cursor: pointer;
        }

        .news-title {
            font-size: 15px;
            font-weight: 500;
            color: #e0e0e0;
            line-height: 1.4;
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .news-source {
            font-size: 12px;
            color: #0a84ff;
        }

        .news-date {
            font-size: 12px;
            color: #8e8e93;
        }

        /* ========== 分享按钮 ========== */
        .share-btn {
            padding: 8px 12px;
            background: #2c2c2e;
            border: none;
            border-radius: 8px;
            color: #0a84ff;
            font-size: 13px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .share-btn:active {
            background: #3c3c3e;
            transform: scale(0.95);
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #8e8e93;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* ========== 加载状态 ========== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚡ 能源新闻聚合</div>
        <div class="header-meta" id="updateTime">加载中...</div>
    </div>

    <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="all">全部</button>
        <button class="category-tab" data-category="政策法规">政策法规</button>
        <button class="category-tab" data-category="企业新闻">企业新闻</button>
        <button class="category-tab" data-category="行业新闻">行业新闻</button>
    </div>

    <div id="content">
        <div class="loading">正在加载新闻数据</div>
    </div>

    <script>
        // ========== 配置 ==========
        const DATA_URL = 'https://cdn.jsdelivr.net/gh/woaipashanhu/energy-news-data/data.json';

        // ========== 全局状态 ==========
        let allNews = [];
        let currentCategory = 'all';

        // ========== 分类顺序 ==========
        const CATEGORY_ORDER = ['政策法规', '企业新闻', '行业新闻'];

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // ========== 加载数据 ==========
        async function loadData() {
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('加载数据失败');
                
                const data = await response.json();
                allNews = data.news || [];
                
                // 更新时间
                document.getElementById('updateTime').textContent = 
                    `更新时间: ${formatTime(data.lastUpdate)} · 共 ${allNews.length} 条`;
                
                // 渲染内容
                renderContent();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('content').innerHTML = 
                    '<div class="empty-state"><div class="icon">⚠️</div><div>加载数据失败，请稍后重试</div></div>';
            }
        }

        // ========== 筛选分类 ==========
        function filterByCategory(category) {
            currentCategory = category;
            
            // 更新标签状态
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            
            renderContent();
        }

        // ========== 渲染内容 ==========
        function renderContent() {
            const container = document.getElementById('content');
            
            if (currentCategory === 'all') {
                // 分三类展示
                container.innerHTML = CATEGORY_ORDER.map(cat => {
                    const news = getNewsByCategory(cat);
                    if (news.length === 0) return '';
                    return `
                        <div class="category-section">
                            <div class="category-header">${cat}</div>
                            <div class="news-list">${renderNewsList(news)}</div>
                        </div>
                    `;
                }).join('');
            } else {
                // 单分类展示
                const news = getNewsByCategory(currentCategory);
                if (news.length === 0) {
                    container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无相关新闻</div></div>';
                } else {
                    container.innerHTML = `<div class="category-section"><div class="news-list">${renderNewsList(news)}</div></div>`;
                }
            }
        }

        // ========== 获取分类新闻 ==========
        function getNewsByCategory(category) {
            return allNews
                .filter(news => news.categories && news.categories.includes(category))
                .sort((a, b) => {
                    const dateA = new Date(a.publishDate || a.crawlDate);
                    const dateB = new Date(b.publishDate || b.crawlDate);
                    return dateB - dateA;
                });
        }

        // ========== 渲染新闻列表 ==========
        function renderNewsList(newsList) {
            return newsList.map(news => `
                <div class="news-card">
                    <div class="news-content" onclick="openNews('${escapeHtml(news.link)}')">
                        <div class="news-title">${escapeHtml(news.title)}</div>
                        <div class="news-meta">
                            <span class="news-source">${escapeHtml(news.source)}</span>
                            <span class="news-date">${escapeHtml(news.publishDate || news.crawlDate)}</span>
                        </div>
                    </div>
                    <button class="share-btn" onclick="shareNews(event, '${escapeHtml(news.link)}', '${escapeHtml(news.title)}')">分享</button>
                </div>
            `).join('');
        }

        // ========== 打开新闻 ==========
        function openNews(link) {
            window.open(link, '_blank');
        }

        // ========== 分享新闻 ==========
        async function shareNews(event, link, title) {
            event.stopPropagation();
            
            if (navigator.share) {
                try {
                    await navigator.share({
                        title: title,
                        url: link
                    });
                } catch (err) {
                    // 用户取消或其他错误
                    copyToClipboard(link);
                }
            } else {
                copyToClipboard(link);
            }
        }

        // ========== 复制到剪贴板 ==========
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('链接已复制: ' + text);
            }).catch(() => {
                alert(text);
            });
        }

        // ========== 工具函数 ==========
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            if (!isoString) return '未知';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
