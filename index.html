<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>能源新闻聚合</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* ========== 顶部导航 ========== */
        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            border-bottom: 0.5px solid #333;
            z-index: 100;
        }

        .header-title {
            font-size: 20px;
            font-weight: 700;
            color: #0a84ff;
        }

        .header-meta {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 4px;
        }

        /* ========== 分类标签 ========== */
        .category-tabs {
            display: flex;
            overflow-x: auto;
            padding: 12px 16px;
            gap: 8px;
            background: #0a0a0a;
            -webkit-overflow-scrolling: touch;
        }

        .category-tabs::-webkit-scrollbar {
            display: none;
        }

        .category-tab {
            padding: 8px 16px;
            background: #1c1c1e;
            border: none;
            border-radius: 20px;
            color: #8e8e93;
            font-size: 14px;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
        }

        .category-tab.active {
            background: #0a84ff;
            color: #ffffff;
        }

        .category-tab:active {
            transform: scale(0.95);
        }

        /* ========== 新闻列表 ========== */
        .news-list {
            padding: 16px;
        }

        .news-card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
        }

        .news-card:active {
            transform: scale(0.98);
            opacity: 0.8;
        }

        .news-title {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
            line-height: 1.4;
            margin-bottom: 8px;
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .news-source {
            font-size: 12px;
            color: #0a84ff;
        }

        .news-date {
            font-size: 12px;
            color: #8e8e93;
        }

        .news-categories {
            display: flex;
            gap: 4px;
            margin-top: 8px;
        }

        .news-category-tag {
            padding: 2px 8px;
            background: #2c2c2e;
            border-radius: 4px;
            font-size: 11px;
            color: #a0a0a0;
        }

        .news-keywords {
            display: flex;
            gap: 4px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .news-keyword {
            padding: 1px 6px;
            background: rgba(10, 132, 255, 0.15);
            border-radius: 3px;
            font-size: 10px;
            color: #0a84ff;
        }

        /* ========== 空状态 ========== */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e93;
        }

        .empty-state .icon {
            font-size: 48px;
            margin-bottom: 16px;
        }

        /* ========== 加载状态 ========== */
        .loading {
            text-align: center;
            padding: 40px;
            color: #8e8e93;
        }

        .loading::after {
            content: '';
            animation: dots 1.5s infinite;
        }

        @keyframes dots {
            0%, 20% { content: '.'; }
            40% { content: '..'; }
            60%, 100% { content: '...'; }
        }

        /* ========== 统计信息 ========== */
        .stats {
            display: flex;
            justify-content: space-around;
            padding: 16px;
            background: #1c1c1e;
            margin: 0 16px 16px;
            border-radius: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #0a84ff;
        }

        .stat-label {
            font-size: 12px;
            color: #8e8e93;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚡ 能源新闻聚合</div>
        <div class="header-meta" id="updateTime">加载中...</div>
    </div>

    <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="all">全部</button>
    </div>

    <div class="stats" id="stats" style="display: none;">
        <div class="stat-item">
            <div class="stat-value" id="totalCount">0</div>
            <div class="stat-label">新闻总数</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="sourceCount">0</div>
            <div class="stat-label">数据来源</div>
        </div>
        <div class="stat-item">
            <div class="stat-value" id="todayCount">0</div>
            <div class="stat-label">今日新增</div>
        </div>
    </div>

    <div class="news-list" id="newsList">
        <div class="loading">正在加载新闻数据</div>
    </div>

    <script>
        // ========== 配置 ==========
        // 数据来源：GitHub + jsDelivr CDN 加速（加时间戳避免缓存）
        const DATA_URL = 'https://cdn.jsdelivr.net/gh/woaipashanhu/energy-news-data/data.json';

        // ========== 全局状态 ==========
        let allNews = [];
        let currentCategory = 'all';
        const categories = new Set(['全部']);

        // ========== 初始化 ==========
        document.addEventListener('DOMContentLoaded', () => {
            loadData();
        });

        // ========== 加载数据 ==========
        async function loadData() {
            try {
                const response = await fetch(DATA_URL + '?t=' + Date.now());
                if (!response.ok) throw new Error('加载数据失败');
                
                const data = await response.json();
                allNews = data.news || [];
                
                // 更新时间
                document.getElementById('updateTime').textContent = 
                    `更新时间: ${formatTime(data.lastUpdate)}`;
                
                // 提取分类
                allNews.forEach(news => {
                    if (news.categories) {
                        news.categories.forEach(cat => categories.add(cat));
                    }
                });
                
                // 渲染分类标签
                renderCategoryTabs();
                
                // 渲染新闻列表
                renderNews();
                
                // 渲染统计
                renderStats();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                document.getElementById('newsList').innerHTML = 
                    '<div class="empty-state"><div class="icon">⚠️</div><div>加载数据失败，请稍后重试</div></div>';
            }
        }

        // ========== 渲染分类标签 ==========
        function renderCategoryTabs() {
            const container = document.getElementById('categoryTabs');
            const categoryNames = {
                'all': '全部',
                '政策法规': '政策法规',
                '行业动态': '行业动态',
                '企业新闻': '企业新闻',
                '新能源': '新能源',
                '电力': '电力',
                '石油天然气': '石油天然气',
                '核能': '核能',
                '国际能源': '国际能源'
            };
            
            const sortedCategories = ['全部', '政策法规', '企业新闻', '行业动态', '新能源', '电力', '石油天然气', '核能', '国际能源'];
            
            container.innerHTML = sortedCategories
                .filter(cat => categories.has(cat) || cat === '全部')
                .map(cat => {
                    const key = cat === '全部' ? 'all' : cat;
                    return `<button class="category-tab ${currentCategory === key ? 'active' : ''}" 
                                    data-category="${key}"
                                    onclick="filterByCategory('${key}')">${cat}</button>`;
                }).join('');
        }

        // ========== 筛选分类 ==========
        function filterByCategory(category) {
            currentCategory = category;
            
            // 更新标签状态
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.classList.toggle('active', tab.dataset.category === category);
            });
            
            renderNews();
        }

        // ========== 渲染新闻列表 ==========
        function renderNews() {
            const container = document.getElementById('newsList');
            
            // 筛选
            let filteredNews = allNews;
            if (currentCategory !== 'all') {
                filteredNews = allNews.filter(news => 
                    news.categories && news.categories.includes(currentCategory)
                );
            }
            
            // 按日期排序
            filteredNews.sort((a, b) => {
                const dateA = new Date(a.publishDate || a.crawlDate);
                const dateB = new Date(b.publishDate || b.crawlDate);
                return dateB - dateA;
            });
            
            if (filteredNews.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>暂无相关新闻</div></div>';
                return;
            }
            
            container.innerHTML = filteredNews.map(news => `
                <div class="news-card" onclick="openNews('${escapeHtml(news.link)}')">
                    <div class="news-title">${escapeHtml(news.title)}</div>
                    <div class="news-meta">
                        <span class="news-source">${escapeHtml(news.source)}</span>
                        <span class="news-date">${escapeHtml(news.publishDate || news.crawlDate)}</span>
                    </div>
                    ${news.categories && news.categories.length > 0 ? `
                        <div class="news-categories">
                            ${news.categories.map(cat => `<span class="news-category-tag">${escapeHtml(cat)}</span>`).join('')}
                        </div>
                    ` : ''}
                    ${news.keywords && news.keywords.length > 0 ? `
                        <div class="news-keywords">
                            ${news.keywords.map(kw => `<span class="news-keyword">${escapeHtml(kw)}</span>`).join('')}
                        </div>
                    ` : ''}
                </div>
            `).join('');
        }

        // ========== 渲染统计 ==========
        function renderStats() {
            document.getElementById('stats').style.display = 'flex';
            document.getElementById('totalCount').textContent = allNews.length;
            
            const sources = new Set(allNews.map(n => n.source));
            document.getElementById('sourceCount').textContent = sources.size;
            
            const today = new Date().toISOString().split('T')[0];
            const todayNews = allNews.filter(n => n.crawlDate === today);
            document.getElementById('todayCount').textContent = todayNews.length;
        }

        // ========== 打开新闻 ==========
        function openNews(link) {
            window.open(link, '_blank');
        }

        // ========== 工具函数 ==========
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(isoString) {
            if (!isoString) return '未知';
            const date = new Date(isoString);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }
    </script>
</body>
</html>
