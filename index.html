<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>能源新闻聚合</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
            background: #000000;
            color: #e0e0e0;
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        .header {
            position: sticky;
            top: 0;
            background: rgba(0, 0, 0, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 16px;
            padding-top: calc(16px + env(safe-area-inset-top));
            border-bottom: 0.5px solid #333;
            z-index: 100;
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            color: #0a84ff;
        }

        .header-meta {
            font-size: 13px;
            color: #8e8e93;
            margin-top: 4px;
        }

        .category-tabs {
            display: flex;
            padding: 12px 16px;
            gap: 8px;
            background: #0a0a0a;
            border-bottom: 0.5px solid #333;
        }

        .category-tab {
            flex: 1;
            padding: 10px 16px;
            background: #1c1c1e;
            border: none;
            border-radius: 8px;
            color: #8e8e93;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
        }

        .category-tab.active {
            background: #0a84ff;
            color: #ffffff;
        }

        .category-tab:active {
            transform: scale(0.98);
        }

        .category-tab .count {
            display: block;
            font-size: 12px;
            font-weight: 400;
            margin-top: 2px;
            opacity: 0.7;
        }

        .news-list {
            padding: 16px;
        }

        .news-card {
            background: #1c1c1e;
            border-radius: 12px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 12px;
        }

        .news-content {
            flex: 1;
            cursor: pointer;
        }

        .news-title {
            font-size: 16px;
            font-weight: 500;
            color: #e0e0e0;
            line-height: 1.4;
        }

        .news-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 6px;
            flex-wrap: wrap;
        }

        .news-source {
            font-size: 13px;
            color: #0a84ff;
        }

        .news-date {
            font-size: 13px;
            color: #8e8e93;
        }

        .share-btn {
            padding: 8px 12px;
            background: #2c2c2e;
            border: none;
            border-radius: 8px;
            color: #0a84ff;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .share-btn:active {
            background: #3c3c3e;
            transform: scale(0.95);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #8e8e93;
        }

        .loading {
            text-align: center;
            padding: 60px;
            color: #8e8e93;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-title">⚡ 能源新闻聚合</div>
        <div class="header-meta" id="updateTime">加载中...</div>
    </div>

    <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="政策法规">
            政策法规<span class="count" id="count1">0</span>
        </button>
        <button class="category-tab" data-category="企业新闻">
            企业新闻<span class="count" id="count2">0</span>
        </button>
        <button class="category-tab" data-category="行业新闻">
            行业新闻<span class="count" id="count3">0</span>
        </button>
    </div>

    <div id="newsList" class="news-list">
        <div class="loading">正在加载...</div>
    </div>

    <script>
        // 多数据源：jsDelivr 优先，GitHub Raw 备用
        const DATA_SOURCES = [
            'https://cdn.jsdelivr.net/gh/woaipashanhu/energy-news-data/data.json',
            'https://raw.githubusercontent.com/woaipashanhu/energy-news-data/main/data.json'
        ];
        let allNews = [];
        let currentCategory = '政策法规';
        const CATEGORIES = ['政策法规', '企业新闻', '行业新闻'];

        document.addEventListener('DOMContentLoaded', () => {
            loadData();
            document.querySelectorAll('.category-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    currentCategory = tab.dataset.category;
                    document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    renderNews();
                });
            });
        });

        async function loadData() {
            // 尝试多个数据源
            for (const url of DATA_SOURCES) {
                try {
                    // 使用 no-store 完全禁用缓存
                    const response = await fetch(url + '?t=' + Date.now(), {
                        cache: 'no-store',
                        headers: { 'Cache-Control': 'no-cache' }
                    });
                    const data = await response.json();
                    
                    // 验证数据有效性
                    if (data && data.lastUpdate && data.news) {
                        allNews = data.news || [];
                        document.getElementById('updateTime').textContent = formatTime(data.lastUpdate);
                        updateCounts();
                        renderNews();
                        console.log('数据加载成功:', url, '更新时间:', data.lastUpdate);
                        return; // 成功则退出
                    }
                } catch (e) {
                    console.warn('数据源失败:', url, e.message);
                }
            }
            // 所有数据源都失败
            document.getElementById('newsList').innerHTML = '<div class="empty-state">加载失败，请检查网络</div>';
        }

        function updateCounts() {
            CATEGORIES.forEach((cat, i) => {
                const count = allNews.filter(n => n.categories && n.categories.includes(cat)).length;
                document.getElementById('count' + (i + 1)).textContent = count;
            });
        }

        function renderNews() {
            const news = allNews
                .filter(n => n.categories && n.categories.includes(currentCategory))
                .sort((a, b) => new Date(b.publishDate || b.crawlDate) - new Date(a.publishDate || a.crawlDate));
            
            const container = document.getElementById('newsList');
            if (news.length === 0) {
                container.innerHTML = '<div class="empty-state">暂无新闻</div>';
                return;
            }

            container.innerHTML = news.map(n => `
                <div class="news-card">
                    <div class="news-content" onclick="window.open('${escapeHtml(n.link)}', '_blank')">
                        <div class="news-title">${escapeHtml(n.title)}</div>
                        <div class="news-meta">
                            <span class="news-source">${escapeHtml(n.source)}</span>
                            <span class="news-date">${escapeHtml(n.publishDate || n.crawlDate)}</span>
                        </div>
                    </div>
                    <button class="share-btn" onclick="shareNews(event, '${escapeHtml(n.link)}', '${escapeHtml(n.title)}')">分享</button>
                </div>
            `).join('');
        }

        async function shareNews(e, link, title) {
            e.stopPropagation();
            if (navigator.share) {
                try { await navigator.share({ title, url: link }); }
                catch { copyLink(link); }
            } else {
                copyLink(link);
            }
        }

        function copyLink(text) {
            navigator.clipboard.writeText(text).then(() => alert('链接已复制'));
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatTime(iso) {
            if (!iso) return '';
            const d = new Date(iso);
            return d.toLocaleString('zh-CN', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }
    </script>
</body>
</html>
